version: "3.9"

services:
  ros:
    build: .

    container_name: ros_noetic

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./catkin_ws:/root/catkin_ws

    network_mode: "host"
    privileged: true

    stdin_open: true
    tty: true
